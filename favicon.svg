<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <rect width="80" height="80" rx="14" fill="#0c0a06"/>
  <!-- Outer gold rim -->
  <circle cx="40" cy="40" r="36" fill="#e8c96d"/>
  <!-- Inner rim shadow ring -->
  <circle cx="40" cy="40" r="33.5" fill="#c8a84a"/>
  <!-- Reel body -->
  <circle cx="40" cy="40" r="31.5" fill="#1c1810"/>
  <!-- 5 film window holes (dist=19 from centre, r=8.5) -->
  <circle cx="40"    cy="21"    r="8.5" fill="#0c0a06"/>
  <circle cx="59.1"  cy="33.9"  r="8.5" fill="#0c0a06"/>
  <circle cx="51.8"  cy="56.1"  r="8.5" fill="#0c0a06"/>
  <circle cx="28.2"  cy="56.1"  r="8.5" fill="#0c0a06"/>
  <circle cx="20.9"  cy="33.9"  r="8.5" fill="#0c0a06"/>
  <!-- Centre hub -->
  <circle cx="40" cy="40" r="5.5" fill="#0c0a06"/>
  <circle cx="40" cy="40" r="3"   fill="#c8a84a"/>
  <circle cx="40" cy="40" r="1.5" fill="#0c0a06"/>
</svg>

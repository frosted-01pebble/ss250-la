<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <rect width="80" height="80" rx="12" fill="#0c0a06"/>
  <g stroke="#e8c96d" fill="#e8c96d">
    <!-- Outer ring -->
    <circle cx="40" cy="40" r="37" fill="none" stroke-width="3"/>
    <!-- Inner hub ring -->
    <circle cx="40" cy="40" r="10" fill="none" stroke-width="2.5"/>
    <!-- Center hole -->
    <circle cx="40" cy="40" r="4"/>
    <!-- 3 spokes -->
    <line x1="40" y1="14" x2="40" y2="26" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14.1" y1="55" x2="20.4" y2="46.1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="65.9" y1="55" x2="59.6" y2="46.1" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 8 sprocket holes -->
    <circle cx="40"    cy="16"    r="3.2" fill="#0c0a06" stroke="none"/>
    <circle cx="56.97" cy="23.03" r="3.2" fill="#0c0a06" stroke="none"/>
    <circle cx="64"    cy="40"    r="3.2" fill="#0c0a06" stroke="none"/>
    <circle cx="56.97" cy="56.97" r="3.2" fill="#0c0a06" stroke="none"/>
    <circle cx="40"    cy="64"    r="3.2" fill="#0c0a06" stroke="none"/>
    <circle cx="23.03" cy="56.97" r="3.2" fill="#0c0a06" stroke="none"/>
    <circle cx="16"    cy="40"    r="3.2" fill="#0c0a06" stroke="none"/>
    <circle cx="23.03" cy="23.03" r="3.2" fill="#0c0a06" stroke="none"/>
  </g>
</svg>

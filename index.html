<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S&S 250 in LA Theaters</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Sight &amp; Sound 250<br><span>Now Playing in LA</span></h1>
    <p class="subtitle">Canonical cinema on the big screen right now</p>
  </header>

  <div id="theater-nav" class="theater-nav hidden"></div>

  <div id="theater-detail" class="theater-detail hidden"></div>

  <div id="api-setup" class="api-setup">
    <p>Enter your <a href="https://www.themoviedb.org/settings/api" target="_blank">TMDB API key</a> to include wide-release data:</p>
    <div class="api-input-row">
      <input type="text" id="api-key-input" placeholder="Paste your TMDB API key here" autocomplete="off">
      <button id="load-btn">Load</button>
    </div>
  </div>

  <div id="status" class="status hidden"></div>

  <div id="results" class="results hidden">
    <section id="matches-section">
      <h2 id="matches-count"></h2>
      <div id="matches-grid" class="movie-grid"></div>
      <div id="no-matches" class="no-matches hidden">
        <p>No Sight &amp; Sound films in wide release right now. Check the full list below.</p>
      </div>
    </section>
    <details id="now-playing-section">
      <summary>All movies in wide release (<span id="now-playing-count"></span>)</summary>
      <div id="now-playing-grid" class="movie-grid compact"></div>
    </details>
  </div>

  <footer>
    <p>Data: <a href="https://www.bfi.org.uk/sight-and-sound/greatest-films-all-time" target="_blank">BFI Sight &amp; Sound 2022 poll</a> · <a href="https://www.themoviedb.org/" target="_blank">TMDB</a></p>
  </footer>

  <script src="ss250.js"></script>
  <script src="theaters.js"></script>
  <script src="app.js"></script>
</body>
</html>
